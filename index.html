<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IC3 GS6 Exam Simulator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="icon-192.ico">
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <script src="script.js" defer></script>
</head>
<body>

    <div id="loading-overlay" class="hidden" role="alert" aria-busy="true" aria-live="polite">
        <div class="spinner"></div>
        <p>Loading Exam Module...</p>
    </div>

    <section id="setup-screen" aria-labelledby="setup-title">
        <h1 id="setup-title">IC3 GS6 Exam Practice</h1>
        
        <form id="setup-form" onsubmit="event.preventDefault();">
            <div class="menu-section">
                <label for="module-select">1. Select Module:</label>
                <select id="module-select" required>
                    <optgroup label="Level 1: Fundamentals">
                        <option value="l1_lesson1">L1M1: Technology Basics</option>
                        <option value="l1_lesson2">L1M2: Digital Citizenship</option>
                        <option value="l1_lesson3">L1M3: Information Management</option>
                        <option value="l1_lesson4">L1M4: Content Creation</option>
                        <option value="l1_lesson5">L1M5: Communication</option>
                        <option value="l1_lesson6">L1M6: Collaboration</option>
                        <option value="l1_lesson7">L1M7: Safety and Security</option>
                    </optgroup>
                    <optgroup label="Level 2: Working Knowledge">
                        <option value="l2_lesson8">L2M8: Technology Basics 2</option>
                    </optgroup>
                </select>
            </div>

            <div class="menu-section">
                <label>2. Choose Simulator Mode:</label>
                <div class="mode-options-group" style="margin-top: 8px; display: flex; gap: 15px;">
                    <label style="font-weight: normal; cursor: pointer;">
                        <input type="radio" name="mode" value="training" checked style="margin-right: 5px;"> 
                        Training Mode (Immediate Feedback)
                    </label>
                    <label style="font-weight: normal; cursor: pointer;">
                        <input type="radio" name="mode" value="testing" style="margin-right: 5px;"> 
                        Testing Mode (Exam Timing)
                    </label>
                </div>
            </div>

            <button type="button" id="start-btn" onclick="startExam()">Start Examination</button>
        </form>
    </section>

    <div id="exam-container" class="hidden">
        <header class="exam-header">
            <div id="timer" aria-live="off" aria-label="Remaining Time">Time: --:--</div>
            <div id="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="Exam Progress">
                <div id="progress-fill"></div>
            </div>
        </header>

        <main id="question-workspace" aria-live="assertive">
            <h2 id="q-text">Question Loading...</h2>
            
            <div id="options-container"></div>
            <div id="interactive-container" class="hidden"></div>
            
            <div id="feedback" class="hidden" role="status" aria-live="polite"></div>
        </main>
        
        <footer class="exam-footer">
            <button id="flag-btn" onclick="toggleFlag()" aria-label="Flag current question for review">Flag for Review</button>
            <div>
                <button id="submit-btn" onclick="checkAnswer()">Submit Answer</button>
                <button id="next-btn" class="hidden" onclick="nextQuestion()">Next Question</button>
            </div>
        </footer>
        
        <nav id="nav-pane" aria-label="Question Navigation Matrix">
            <h3>Question Overview</h3>
            <div id="q-grid" role="list"></div>
        </nav>
    </div>

    <section id="review-screen" class="hidden" aria-labelledby="review-title">
        <h2 id="review-title">Exam Summary</h2>
        <p style="color: #4a5568; margin-bottom: 20px;">Click any question to return and edit your answer. 🚩 indicates flagged items.</p>
        <div id="review-list" role="list"></div>
        <div class="review-actions">
            <button onclick="submitExam()" style="background: #28a745; color: white;">Submit Final Exam</button>
            <button onclick="document.getElementById('review-screen').classList.add('hidden'); document.getElementById('exam-container').classList.remove('hidden');">Back to Exam</button>
        </div>
    </section>

    <section id="result-screen" class="hidden" aria-labelledby="result-title">
        <h2 id="result-title">Exam Complete!</h2>
        <div id="final-score" aria-live="polite"></div>
        <button onclick="location.reload()" style="margin-top: 20px; background: #0056b3; color: white;">Return to Main Menu</button>
    </section>

    <footer class="copyright-footer" role="contentinfo">
        <p>© 2026 IC3 GS6 Exam Simulator. All Rights Reserved. Designed by <span>Donfaruk19</span>.</p>
    </footer>

</body>
</html>
