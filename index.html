<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IC3 GS6 Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="setup-screen">
        <h1>IC3 GS6 L1 Exam Prep</h1>
		<header>
    		<div id="module-title">IC3 Digital Literacy</div>
    		<div class="timer" id="timer">Timer: 45:00</div>
   			<button id="quit-btn" onclick="quitToMenu()">Quit to Menu</button>
		</header>
        <div class="menu-section">
            <label>1. Select Module:</label>
            <select id="module-select">
				<option value="lesson1">Lesson 1: Technology Basics</option>
				<option value="lesson2">Lesson 2: Digital Citizenship</option>
				<option value="lesson3">Lesson 3: Information Management</option>
				<option value="lesson4">Lesson 4: Content Creation</option>
				<option value="lesson5">Lesson 5: Communication</option>
			</select>
        </div>
        <div class="menu-section">
            <label>2. Select Mode:</label>
            <button onclick="startApp('training')">Training Mode (Feedback ON)</button>
            <button onclick="startApp('testing')">Testing Mode (Exam Style)</button>
        </div>
    </div>

    <div id="exam-container" class="hidden">
        <header>
            <div id="module-title">IC3 Digital Literacy</div>
            <div class="timer" id="exam-timer">Timer: 45:00</div>
            <button id="quit-btn" onclick="quitToMenu()">Quit to Menu</button>
        </header>
        <main id="question-area">
            <div id="q-number">Question 1 of --</div>
            <h2 id="q-text">Question text?</h2>
            <div id="options-container"></div>
            <div id="feedback" class="hidden"></div>
        </main>
        <footer>
            <button id="submit-btn" onclick="checkAnswer()">Submit Answer</button>
            <button id="next-btn" class="hidden" onclick="nextQuestion()">Next Question</button>
        </footer>
    </div>

    <div id="result-screen" class="hidden">
        <h2 id="status-text">Module Complete!</h2>
        <div id="final-score"></div>
        <button onclick="location.reload()">Back to Main Menu</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
